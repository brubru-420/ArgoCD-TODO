apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todo-api-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/brubru-420/gitops-ouinouin
    targetRevision: HEAD
    path: apps/todo-api/overlays/staging # On pointe sur staging
  destination:
    server: https://kubernetes.default.svc
    namespace: todo-api-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
